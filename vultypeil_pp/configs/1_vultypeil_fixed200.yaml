# Ablation 1: VulTypeIL Original (Fixed 200, Mahalanobis)
# Baseline method from original paper

method: vultypeil_fixed200_maha
description: "Original VulTypeIL with fixed 200 samples selected by Mahalanobis distance"

# Data settings
data:
  data_dir: "/admin/dataset"
  num_tasks: 5
  num_classes: 23

# Model settings
model:
  name: "t5"
  pretrained_path: "Salesforce/codet5-base"
  max_seq_length: 512
  freeze_plm: false

# Training settings
training:
  batch_size: 16
  num_epochs: 100
  lr: 5e-5
  patience: 5
  use_cuda: true
  seed: 42

# Loss settings
loss:
  smoothing: 0.1
  focal_alpha: 1.0
  focal_gamma: 2.0
  ewc_lambda: 0.4
  decay_factor: 0.9

# Replay settings
replay:
  mode: "append_dataset"  # Materialize full dataset
  selector: "mahalanobis"
  num_samples: 200  # Fixed 200 samples
  ratio_allold: null

# Buffer settings
buffer:
  enabled: false  # No buffer, use append mode

# Consolidation settings
consolidation:
  enabled: false

# Output settings
output:
  checkpoint_dir: "outputs/1_fixed200/checkpoints"
  results_dir: "outputs/1_fixed200/results"
  metrics_dir: "outputs/1_fixed200/metrics"
